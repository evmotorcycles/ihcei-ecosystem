apiVersion: apps/v1
kind: Deployment
metadata:
  name: ihcei-sovereign-os
  labels:
    app: ihcei-ci-ei
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ihcei-ci-ei
  template:
    metadata:
      labels:
        app: ihcei-ci-ei
    spec:
      containers:
      - name: ci-ei-core
        image: ihcei/sovereign-os:latest
        ports:
        - containerPort: 8000
        env:
        - name: PARADIGM_MODE
          value: "CI_EI"
        - name: ADGE_PHYSICS_ACTIVE
          value: "true"
        - name: NERE_KERNEL_ACTIVE
          value: "true"
        - name: C_DEV_THRESHOLD
          value: "50.0"
        - name: SHIRK_THRESHOLD
          value: "0.1"
        - name: RIBA_THRESHOLD
          value: "0.1"
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
          requests:
            cpu: "0.5"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ihcei-service
spec:
  selector:
    app: ihcei-ci-ei
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: LoadBalancer
