name: secret-scan
# Free, open-source secret scanning on every push and PR (no GitHub Advanced
# Security needed). Fails the build if a credential is committed. This is the
# in-repo equivalent of "turn on secret scanning" — it works on public repos
# without a paid tier. (Native push-protection is an admin toggle in Settings →
# Code security; see SECURITY.md.)
on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0            # full history so historical leaks are caught too
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # gitleaks-action is free for public repositories; no license needed.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
