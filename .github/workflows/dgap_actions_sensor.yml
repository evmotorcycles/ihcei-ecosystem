name: GovPhys D_gap Sensor Pipeline

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Target repository for confirmatory cohort'
        required: true
        default: 'kubernetes/kubernetes'
      start_page:
        description: 'Start page for PR fetching'
        required: true
        default: '1'

jobs:
  run-sensor:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests numpy scipy scikit-learn statsmodels

      - name: Run D_gap Sensor v3.1
        env:
          GITHUB_TOKEN: ${{ secrets.GOVPHYS_PAT || github.token }}
        run: |
          python dgap_actions_sensor_v3.py --repo "${{ github.event.inputs.target_repo }}" --start-page "${{ github.event.inputs.start_page }}"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dgap-sensor-results
          path: |
            dgap_sensor_results.json
