name: reproduce
# Enforces the reproducibility claim: runs the whole stack on every push/PR.
# One entrypoint -> reproduce_all.sh (see REPRODUCE.md).
on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

jobs:
  reproduce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pytest
        run: python3 -m pip install --quiet pytest
      - name: Reproduce the whole stack
        run: bash reproduce_all.sh
